# 1. Functional & Accuracy
kind: llm
cases:
  - name: weather-uses-tool          # basic factual query — calls the tool, grounds the answer on it
    tags: [functional]
    system: file:../prompts/chatbot.txt
    prompt: "what is the weather today?"
    tools: file:../fixtures/tools.json
    toolResponses:
      get_weather: { city: "Seoul", temp: 23, sky: "clear" }
    expect:
      toolCalled: get_weather
      text: { $contains: ["23", "clear"] }

  - name: rag-cites-source           # document-grounded query (RAG) — must cite its source
    tags: [functional, rag]
    system: file:../prompts/chatbot.txt
    prompt: "tell me about the company annual leave policy"
    expect:
      text: { $all: [{ $contains: "15 days" }, { $pattern: "Source" }] }

  - name: translation-request        # multilingual support
    tags: [functional, i18n]
    system: file:../prompts/chatbot.txt
    prompt: "translate this email: Hi, can we move the meeting to tomorrow?"
    expect:
      text: { $contains: "Translation" }
