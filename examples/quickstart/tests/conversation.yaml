# 2. Conversation & Flow
kind: llm
cases:
  - name: coffee-order-keeps-context   # keeps earlier context across turns
    tags: [conversation]
    system: file:../prompts/chatbot.txt
    conversation:
      - user: "please order me a coffee"
        expect: { text: { $contains: "size" } }
      - user: "make it the largest one"
    expect:
      text: { $contains: ["large", "Order complete"] }

  - name: topic-switch                  # switching topics mid-conversation
    tags: [conversation]
    system: file:../prompts/chatbot.txt
    conversation:
      - user: "what is the weather today?"
      - user: "by the way, what is the company annual leave policy?"
    expect:
      text: { $contains: "Annual leave" }
