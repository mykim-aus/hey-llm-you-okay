# Quickstart — the full pyramid against the offline demo server (no API keys).
# Swap providers for real ones (gemini/anthropic/openai/ollama) in your project.
version: 1

providers:
  subject:
    kind: openai-compatible
    baseUrl: http://127.0.0.1:4141/v1
    model: demo-chatbot
  judge:
    kind: openai-compatible
    baseUrl: http://127.0.0.1:4141/v1
    model: demo-judge

settings:
  triage: { repeat: 3 }
  capture: { file: tests/captured.yaml }

layers:
  # Tier 1 — static checks: prompt-file typos and required sections (ms, free)
  - name: static
    kind: static
    include: tests/static.yaml

  # Tier 2 — HTTP integration: the app API's auth and error paths (deterministic)
  - name: api
    kind: http
    include: tests/http.yaml

  # Tier 3 — LLM behavior: deterministic assertions on tool calls, flow and wording
  # (the demo server is deterministic so gating is safe here — with a real model,
  #  gate carefully and pair it with repeat/passRate)
  - name: behavior
    kind: llm
    provider: subject
    gate: true
    include:
      - tests/functional.yaml
      - tests/conversation.yaml
      - tests/captured.yaml
    repeat: 1

  # Tier 4 — LLM-as-a-judge: reliability and security scored by rubric (priciest, last)
  - name: quality
    kind: judge
    subject: subject
    judge: judge
    include:
      - tests/reliability.yaml
      - tests/security.yaml
    votes: 3
    threshold: 7
